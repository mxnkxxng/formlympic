<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>폼림 연습기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  background:#f0f0f0;min-height:100vh;
  display:flex;justify-content:center;padding-bottom:40px;
}
#wrap{width:100%;max-width:430px;background:#f5f5f5;min-height:100vh;}

/* 상단 */
.top-bar{
  background:#fff;padding:12px 14px;
  border-bottom:1px solid #e8e8e8;
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;
}
.top-bar label{font-size:13px;color:#888;white-space:nowrap;}
.time-pick{
  display:flex;align-items:center;gap:3px;
  background:#f7f7f7;border:1.5px solid #ddd;
  border-radius:8px;padding:7px 10px;
}
.time-pick input{
  width:26px;border:none;background:transparent;
  font-size:16px;font-weight:700;color:#111;
  text-align:center;font-family:inherit;outline:none;
  font-variant-numeric:tabular-nums;padding:0;
}
.time-pick .sep{color:#bbb;font-size:16px;font-weight:400;}
.go-btn{
  padding:8px 18px;background:#3dcbb4;color:#fff;
  border:none;border-radius:8px;font-size:13px;font-weight:700;
  cursor:pointer;font-family:inherit;
}
.go-btn:disabled{background:#ccc;cursor:not-allowed;}
.rst-btn{
  padding:8px 12px;background:#888;color:#fff;
  border:none;border-radius:8px;font-size:13px;font-weight:700;
  cursor:pointer;font-family:inherit;display:none;
}

/* 타이머 바 — 현재시각 크게, 상태 작게 */
.timer-bar{
  text-align:center;padding:16px 16px 12px;
  color:#fff;transition:background 0.25s;
}
.timer-bar.idle  {background:#3a3a3a;}
.timer-bar.wait  {background:#555;}
.timer-bar.near  {background:#b35a00;}
.timer-bar.open  {background:#1aaa8e;}
.timer-bar.early {background:#c0392b;}
.timer-bar.done  {background:#185fa5;}

/* 현재 시각 */
.t-now{
  font-size:42px;font-weight:700;
  font-variant-numeric:tabular-nums;letter-spacing:3px;line-height:1;
}
/* 상태/결과 텍스트 */
.t-status{
  font-size:13px;margin-top:6px;opacity:0.8;
  font-variant-numeric:tabular-nums;letter-spacing:0.5px;
}

/* 폼 */
.form-body{
  background:#fff;margin:12px 12px 0;
  border-radius:10px;border:1px solid #e8e8e8;padding:20px 16px;
}
.form-title{font-size:18px;font-weight:700;color:#111;margin-bottom:16px;}
.info-box{border:1px solid #e0e0e0;border-radius:8px;padding:12px 14px;margin-bottom:6px;}
.global-tag{
  display:inline-block;border:1.5px solid #888;border-radius:20px;
  font-size:11px;font-weight:700;color:#555;padding:1px 10px;
  margin-bottom:10px;letter-spacing:0.5px;
}
.info-row{display:flex;align-items:center;padding:5px 0;font-size:14px;}
.info-row .lbl{color:#888;min-width:36px;font-size:13px;}
.info-row .val{font-weight:600;color:#111;}
.notice{font-size:12px;color:#888;margin:6px 0 16px;}
.fg{margin-bottom:16px;}
.fl{font-size:13px;color:#555;margin-bottom:6px;font-weight:500;display:flex;align-items:center;gap:4px;}
.req{color:#e05a2b;}
.ri{
  width:100%;background:#f7f7f7;border:1.5px solid #e0e0e0;
  border-radius:8px;padding:13px 14px;font-size:15px;color:#111;
  font-family:inherit;outline:none;transition:border-color 0.2s,background 0.2s;
}
.ri::placeholder{color:#bbb;font-size:14px;}
.ri:focus{border-color:#3dcbb4;background:#fff;}
.ri:disabled{background:#f2f2f2;color:#999;cursor:not-allowed;}
.nr{display:flex;gap:8px;}
.pr{display:flex;gap:8px;}
.cbox{
  display:flex;align-items:center;gap:4px;
  background:#f2f2f2;border:1.5px solid #e0e0e0;border-radius:8px;
  padding:13px 12px;font-size:14px;color:#333;font-weight:600;min-width:72px;
}
.err{font-size:12px;color:#e05a2b;margin-top:5px;display:none;}
.err.on{display:block;}
.divider{height:1px;background:#f0f0f0;margin:16px 0;}
.ag{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 0;gap:8px;}
.agl{display:flex;align-items:flex-start;gap:8px;flex:1;}
.agt{font-size:13px;color:#333;line-height:1.5;}

/* 참여 버튼 */
.sub-area{margin:10px 12px 0;}
.sub-btn{
  width:100%;padding:17px;background:#3dcbb4;color:#fff;
  border:none;border-radius:10px;font-size:17px;font-weight:700;
  cursor:pointer;letter-spacing:0.5px;font-family:inherit;transition:transform 0.06s;
}
.sub-btn:active{transform:scale(0.97);}
.sub-btn:disabled{background:#ccc;cursor:not-allowed;}
.sub-btn.locked{background:#e05a2b;animation:puls .7s ease-in-out infinite alternate;}
.sub-btn.go{animation:goA .4s ease-in-out infinite alternate;}
@keyframes puls{from{opacity:1}to{opacity:.65}}
@keyframes goA{from{background:#3dcbb4}to{background:#1aaa8e}}

.footer-nav{text-align:center;margin-top:18px;font-size:12px;color:#bbb;}

/* 로그 */
.log-panel{margin:12px 12px 0;background:#fff;border-radius:10px;border:1px solid #e8e8e8;padding:14px 16px;}
.log-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.log-head-title{font-size:14px;font-weight:700;color:#111;}
.log-clr{font-size:12px;color:#bbb;border:none;background:none;cursor:pointer;font-family:inherit;}
.log-clr:hover{color:#e05a2b;}
.log-entry{font-size:13px;padding:8px 0;border-bottom:1px solid #f5f5f5;}
.log-entry:last-child{border-bottom:none;}
.log-top{display:flex;align-items:center;gap:10px;}
.log-sub{font-size:11px;color:#bbb;margin-top:2px;padding-left:38px;}
.log-rank{min-width:28px;font-weight:700;color:#888;font-size:12px;}
.log-name{flex:1;font-weight:600;color:#111;}
.log-diff{font-variant-numeric:tabular-nums;font-size:13px;white-space:nowrap;color:#555;}
.log-diff.best{color:#1aaa8e;font-weight:700;}
.log-diff.disq{color:#e05a2b;}
.log-ts{font-size:11px;color:#bbb;white-space:nowrap;}
.log-empty{text-align:center;color:#bbb;font-size:13px;padding:14px 0;}
</style>
</head>
<body>
<div id="wrap">

  <!-- 목표 시각 설정 + 시작 -->
  <div class="top-bar">
    <label>목표 시각</label>
    <div class="time-pick">
      <input id="tH" value="14" maxlength="2" inputmode="numeric"
        oninput="this.value=this.value.replace(/\D/g,'').slice(0,2)"
        onblur="padT(this,23)"/>
      <span class="sep">:</span>
      <input id="tM" value="00" maxlength="2" inputmode="numeric"
        oninput="this.value=this.value.replace(/\D/g,'').slice(0,2)"
        onblur="padT(this,59)"/>
      <span class="sep">:</span>
      <input id="tS" value="00" maxlength="2" inputmode="numeric"
        oninput="this.value=this.value.replace(/\D/g,'').slice(0,2)"
        onblur="padT(this,59)"/>
    </div>
    <button class="go-btn" id="startBtn" onclick="startGame()">▶ 시작</button>
    <button class="rst-btn" id="resetBtn" onclick="resetGame()">↺ 초기화</button>
  </div>

  <!-- 타이머: 현재 시각 크게 -->
  <div class="timer-bar idle" id="tBar">
    <div class="t-now" id="tNow">--:--:--</div>
    <div class="t-status" id="tStatus">목표 시각을 설정하고 시작하세요</div>
  </div>

  <!-- 폼 -->
  <div class="form-body">
    <div class="form-title">신청 정보</div>
    <div class="info-box">
      <div class="global-tag">GLOBAL</div>
      <div class="info-row"><span class="lbl">이름</span><span class="val" id="dFirst">───</span></div>
      <div class="info-row"><span class="lbl">성</span><span class="val" id="dLast">───</span></div>
    </div>
    <div class="notice">*이름 정보는 수정이 불가능합니다.</div>

    <div class="fg">
      <div class="fl">이름 &amp; 성 <span class="req">*</span></div>
      <div class="nr">
        <input class="ri" type="text" id="inFirst" placeholder="이름 (예: 길동)" maxlength="10" oninput="syncName()"/>
        <input class="ri" type="text" id="inLast"  placeholder="성 (예: 홍)"    maxlength="10" oninput="syncName()"/>
      </div>
      <div class="err" id="errName">이름과 성을 모두 입력해주세요.</div>
    </div>

    <div class="fg">
      <div class="fl">생년월일 <span class="req">*</span></div>
      <input class="ri" type="text" id="inBirth" placeholder="8자리 (예: 19990101)" maxlength="8" inputmode="numeric" oninput="this.value=this.value.replace(/\D/g,'')"/>
      <div class="err" id="errBirth">생년월일 8자리를 입력해주세요.</div>
    </div>

    <div class="fg">
      <div class="fl">연락처 <span class="req">*</span></div>
      <div class="pr">
        <div class="cbox">+82 <span style="font-size:10px;color:#888;">▾</span></div>
        <input class="ri" type="text" id="inPhone" placeholder="010xxxxxxxx" maxlength="11" inputmode="numeric" oninput="this.value=this.value.replace(/\D/g,'')" style="flex:1;"/>
      </div>
      <div class="err" id="errPhone">올바른 전화번호를 입력해주세요.</div>
    </div>

    <div class="divider"></div>
    <div class="ag">
      <div class="agl">
        <svg width="18" height="18" viewBox="0 0 18 18" style="flex-shrink:0;margin-top:1px;">
          <circle cx="9" cy="9" r="9" fill="#3dcbb4"/>
          <polyline points="4,9 7.5,12.5 14,6" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="agt">개인정보 수집 이용 동의서</span>
      </div>
      <span style="font-size:14px;color:#bbb;">﹀</span>
    </div>
  </div>

  <div class="sub-area">
    <button class="sub-btn" id="subBtn" onclick="pressBtn()" disabled>참여 신청</button>
  </div>
  <div class="footer-nav">사녹폼림 · 신청정보 · 전화번호</div>

  <div class="log-panel">
    <div class="log-head">
      <span class="log-head-title">📋 기록 로그</span>
      <button class="log-clr" onclick="clearLog()">전체 삭제</button>
    </div>
    <div id="logList"><div class="log-empty">아직 기록이 없습니다</div></div>
  </div>
</div>

<script>
let phase = 'idle';
let playerName = '';
let tH = 14, tM = 0, tS = 0;
let rafId = null;
let hasPressed = false;
let openAt = 0;   // 목표 시각 정확한 ms timestamp
let log = [];

function pad2(n){ return n.toString().padStart(2,'0'); }
function padT(el, max){
  let v = parseInt(el.value) || 0;
  if(v > max) v = max;
  el.value = pad2(v);
}

/* ── 현재 시각 항상 표시 ── */
function clockLoop(){
  const n = new Date();
  document.getElementById('tNow').textContent =
    pad2(n.getHours()) + ':' + pad2(n.getMinutes()) + ':' + pad2(n.getSeconds());
  requestAnimationFrame(clockLoop);
}
clockLoop();

function syncName(){
  const f = document.getElementById('inFirst').value.trim();
  const l = document.getElementById('inLast').value.trim();
  document.getElementById('dFirst').textContent = f || '───';
  document.getElementById('dLast').textContent  = l || '───';
}

function validate(){
  let ok = true;
  const f = document.getElementById('inFirst').value.trim();
  const l = document.getElementById('inLast').value.trim();
  const b = document.getElementById('inBirth').value.trim();
  const p = document.getElementById('inPhone').value.trim();
  setErr('errName',  !f||!l);        if(!f||!l)       ok = false;
  setErr('errBirth', b.length!==8);  if(b.length!==8) ok = false;
  setErr('errPhone', p.length<10);   if(p.length<10)  ok = false;
  return ok;
}
function setErr(id, show){ document.getElementById(id).classList.toggle('on', show); }

/* ── 목표 timestamp 계산 ── */
function calcOpenAt(){
  const now = new Date();
  const t = new Date(now.getFullYear(), now.getMonth(), now.getDate(), tH, tM, tS, 0);
  // 이미 지난 시각이면 내일로
  if(t.getTime() <= Date.now()) t.setDate(t.getDate() + 1);
  return t.getTime();
}

/* ── 시작 ── */
function startGame(){
  if(!validate()) return;
  tH = parseInt(document.getElementById('tH').value) || 0;
  tM = parseInt(document.getElementById('tM').value) || 0;
  tS = parseInt(document.getElementById('tS').value) || 0;

  const f = document.getElementById('inFirst').value.trim();
  const l = document.getElementById('inLast').value.trim();
  playerName = l + f;

  openAt = calcOpenAt(); // 목표 시각 ms 고정

  phase = 'wait'; hasPressed = false;
  setInputsDisabled(true);
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('resetBtn').style.display = 'inline-block';

  const btn = document.getElementById('subBtn');
  btn.disabled = false;
  btn.className = 'sub-btn locked';
  btn.textContent = '참여 신청 (대기 중 — 일찍 누르면 실격!)';

  setBarCls('wait');
  watchLoop();
}

/* ── 대기 루프: openAt 까지 카운트다운 ── */
function watchLoop(){
  if(phase !== 'wait' && phase !== 'near') return;

  const rem = openAt - Date.now(); // 남은 ms

  if(rem <= 0){
    openNow();
    return;
  }

  // 상태 표시: 남은 시간 없이 그냥 색만 바꿔줌
  if(rem <= 10000) setBarCls('near');
  else             setBarCls('wait');

  // 상태 텍스트: 목표 시각 표시
  document.getElementById('tStatus').textContent =
    pad2(tH) + ':' + pad2(tM) + ':' + pad2(tS) + ' 에 열립니다 — 대기 중';

  rafId = requestAnimationFrame(watchLoop);
}

/* ── 열림: openAt 이후 경과 ms 카운트업 ── */
function openNow(){
  phase = 'open';
  setBarCls('open');

  const btn = document.getElementById('subBtn');
  btn.className = 'sub-btn go';
  btn.textContent = '참여 신청 ← 지금 눌러!';

  function countUp(){
    if(phase !== 'open') return;
    const el  = Date.now() - openAt;         // openAt 기준 정확한 경과 ms
    const s   = Math.floor(el / 1000);
    const ms3 = Math.floor(el % 1000).toString().padStart(3, '0');
    document.getElementById('tStatus').textContent = '+' + s + '초 ' + ms3;
    rafId = requestAnimationFrame(countUp);
  }
  rafId = requestAnimationFrame(countUp);
}

/* ── 버튼 클릭 ── */
function pressBtn(){
  if(phase === 'idle' || hasPressed) return;
  hasPressed = true;

  // 일찍 누름 → 실격
  if(phase === 'wait' || phase === 'near'){
    cancelAnimationFrame(rafId);
    phase = 'done';
    const earlyMs = openAt - Date.now();
    setBarCls('early');
    document.getElementById('tStatus').textContent =
      pad2(tH)+':'+pad2(tM)+':'+pad2(tS) + ' 보다 ' + (earlyMs/1000).toFixed(3) + '초 일찍';
    lockBtn();
    addLog(playerName, null, true);
    endState();
    return;
  }

  // 정상 클릭
  if(phase === 'open'){
    cancelAnimationFrame(rafId);
    const diffMs = Date.now() - openAt;  // openAt 고정값 기준으로 정확히 계산
    phase = 'done';
    const s   = Math.floor(diffMs / 1000);
    const ms3 = Math.floor(diffMs % 1000).toString().padStart(3, '0');
    setBarCls('done');
    document.getElementById('tStatus').textContent = '+' + s + '초 ' + ms3;
    lockBtn();
    addLog(playerName, diffMs, false);
    endState();
  }
}

function setBarCls(cls){
  document.getElementById('tBar').className = 'timer-bar ' + cls;
}
function lockBtn(){
  const b = document.getElementById('subBtn');
  b.disabled = true; b.className = 'sub-btn'; b.textContent = '참여 신청';
}
function endState(){
  document.getElementById('startBtn').style.display = 'inline-block';
  document.getElementById('resetBtn').style.display = 'none';
  setInputsDisabled(false);
}
function resetGame(){
  cancelAnimationFrame(rafId);
  phase = 'idle'; hasPressed = false; openAt = 0;
  setBarCls('idle');
  document.getElementById('tStatus').textContent = '목표 시각을 설정하고 시작하세요';
  document.getElementById('startBtn').style.display = 'inline-block';
  document.getElementById('resetBtn').style.display = 'none';
  const b = document.getElementById('subBtn');
  b.disabled = true; b.className = 'sub-btn'; b.textContent = '참여 신청';
  setInputsDisabled(false);
}
function setInputsDisabled(v){
  ['inFirst','inLast','inBirth','inPhone','tH','tM','tS'].forEach(id => {
    const el = document.getElementById(id); if(el) el.disabled = v;
  });
}

/* ── 로그 ── */
function addLog(name, ms, isEarly){
  const b = document.getElementById('inBirth').value.trim();
  const p = document.getElementById('inPhone').value.trim();
  log.unshift({ name, ms, isEarly, birth: b, phone: p, ts: new Date() });
  renderLog();
}
function renderLog(){
  const list = document.getElementById('logList');
  if(!log.length){ list.innerHTML = '<div class="log-empty">아직 기록이 없습니다</div>'; return; }

  const valid = log.filter(e => !e.isEarly && e.ms != null).sort((a,b) => a.ms - b.ms);
  list.innerHTML = '';

  log.forEach(entry => {
    const wrap = document.createElement('div'); wrap.className = 'log-entry';
    const top  = document.createElement('div'); top.className  = 'log-top';

    const rank = document.createElement('div'); rank.className = 'log-rank';
    if(!entry.isEarly && entry.ms != null){
      const r = valid.indexOf(entry) + 1;
      rank.textContent = r===1?'🥇':r===2?'🥈':r===3?'🥉':r+'위';
    } else { rank.textContent = '✕'; }

    const nm = document.createElement('div'); nm.className = 'log-name';
    nm.textContent = entry.name;

    const diff = document.createElement('div'); diff.className = 'log-diff';
    if(entry.isEarly){
      diff.textContent = '실격';
      diff.classList.add('disq');
    } else {
      const s   = Math.floor(entry.ms / 1000);
      const ms3 = Math.floor(entry.ms % 1000).toString().padStart(3, '0');
      diff.textContent = '+' + s + '초 ' + ms3;
      if(valid[0] === entry) diff.classList.add('best');
    }

    const ts = document.createElement('div'); ts.className = 'log-ts';
    const t = entry.ts;
    ts.textContent = [t.getHours(), t.getMinutes(), t.getSeconds()]
      .map(n => n.toString().padStart(2,'0')).join(':');

    top.append(rank, nm, diff, ts);

    const sub = document.createElement('div'); sub.className = 'log-sub';
    const bf = entry.birth || '';
    const pf = (entry.phone||'').replace(/(\d{3})(\d{3,4})(\d{4})/, '$1-$2-$3');
    const bFmt = bf.length===8 ? bf.slice(0,4)+'.'+bf.slice(4,6)+'.'+bf.slice(6) : bf;
    sub.textContent = bFmt + (bFmt&&pf ? '  |  ' : '') + pf;

    wrap.append(top, sub);
    list.appendChild(wrap);
  });
}
function clearLog(){ log = []; renderLog(); }
</script>
</body>
</html>
